<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Stream Channel Parser (Python + JS)</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        textarea, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; }
        textarea { height: 150px; font-family: monospace; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .results { margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; word-break: break-all; }
        th { background: #f2f2f2; }
        .error { color: red; background: #ffe6e6; padding: 10px; border-radius: 4px; }
        .info { color: green; background: #e6ffe6; padding: 10px; border-radius: 4px; }
        .radio-group { margin: 15px 0; display: flex; flex-wrap: wrap; gap: 15px; }
        .radio-group label { margin-right: 10px; }
        footer { margin-top: 20px; text-align: center; font-size: 12px; color: #777; }
    </style>
</head>
<body>
<div class="container">
    <h1>📡 Universal Stream Channel Parser</h1>
    <p>Backend parsing with Python (Flask) – supports M3U, JSON, Web, XML, RSS, XSPF, CSV, PLS, Text, iFrame, Direct Streams</p>

    <div class="radio-group">
        <label><input type="radio" name="parser" value="m3u" checked> M3U/M3U8</label>
        <label><input type="radio" name="parser" value="json"> JSON</label>
        <label><input type="radio" name="parser" value="webpage"> Web Page</label>
        <label><input type="radio" name="parser" value="direct"> Direct Stream</label>
        <label><input type="radio" name="parser" value="iframe"> iFrame HTML</label>
        <label><input type="radio" name="parser" value="xml"> XML</label>
        <label><input type="radio" name="parser" value="rss"> RSS Feed</label>
        <label><input type="radio" name="parser" value="xspf"> XSPF Playlist</label>
        <label><input type="radio" name="parser" value="csv"> CSV</label>
        <label><input type="radio" name="parser" value="pls"> PLS Playlist</label>
        <label><input type="radio" name="parser" value="text"> Text File (URLs)</label>
    </div>

    <textarea id="inputContent" placeholder="Paste playlist/JSON/XML/CSV/HTML or enter a URL (http://...)..."></textarea>

    <button id="parseBtn">🚀 Parse Channels</button>
    <button id="sampleBtn" style="background:#6c757d;">📋 Load Sample</button>

    <div id="resultArea" style="display:none;" class="results">
        <h3>Extracted Channels</h3>
        <div id="resultTable"></div>
    </div>
    <footer>Powered by Python + Flask | Parses multiple formats | No CORS issues</footer>
</div>

<script>
    const parseBtn = document.getElementById('parseBtn');
    const sampleBtn = document.getElementById('sampleBtn');
    const inputArea = document.getElementById('inputContent');
    const resultArea = document.getElementById('resultArea');
    const resultTable = document.getElementById('resultTable');

    parseBtn.addEventListener('click', async () => {
        const input = inputArea.value.trim();
        if (!input) {
            alert('Please enter a URL or paste content.');
            return;
        }
        const parser = document.querySelector('input[name="parser"]:checked').value;

        resultArea.style.display = 'none';
        resultTable.innerHTML = '<div class="info">Processing...</div>';
        resultArea.style.display = 'block';

        try {
            const response = await fetch('/parse', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ parser: parser, input: input })
            });
            const data = await response.json();
            if (response.ok) {
                if (data.channels && data.channels.length > 0) {
                    displayChannels(data.channels);
                } else {
                    resultTable.innerHTML = '<div class="error">No channels found.</div>';
                }
            } else {
                resultTable.innerHTML = `<div class="error">Error: ${data.error}</div>`;
            }
        } catch (err) {
            resultTable.innerHTML = `<div class="error">Network error: ${err.message}</div>`;
        }
    });

    function displayChannels(channels) {
        let html = '点<table><thead><tr><th>#</th><th>Channel Name</th><th>Stream URL</th></tr></thead><tbody>';
        channels.forEach((ch, idx) => {
            html += `<tr>
                         <td>${idx+1}</td>
                         <td>${escapeHtml(ch.name)}</td>
                         <td><a href="${escapeHtml(ch.url)}" target="_blank">${escapeHtml(ch.url)}</a></td>
                     </tr>`;
        });
        html += '</tbody></table>';
        resultTable.innerHTML = html;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Load sample data based on selected parser
    sampleBtn.addEventListener('click', () => {
        const parser = document.querySelector('input[name="parser"]:checked').value;
        let sample = '';
        switch(parser) {
            case 'm3u':
                sample = `#EXTM3U
#EXTINF:-1 tvg-logo="logo.png",BBC One
http://example.com/bbc1.m3u8
#EXTINF:-1,CNN
http://example.com/cnn.m3u8`;
                break;
            case 'json':
                sample = `[
  { "name": "BBC One", "url": "http://example.com/bbc1.m3u8" },
  { "name": "CNN", "url": "http://example.com/cnn.m3u8" }
]`;
                break;
            case 'webpage':
                sample = `<html><body>
<a href="http://example.com/bbc1.m3u8">BBC One</a>
<iframe src="http://example.com/cnn.m3u8"></iframe>
</body></html>`;
                break;
            case 'direct':
                sample = `http://example.com/live.m3u8`;
                break;
            case 'iframe':
                sample = `<iframe src="https://example.com/embed/channel1"></iframe>
<iframe src="https://example.com/embed/channel2" title="Channel 2"></iframe>`;
                break;
            case 'xml':
                sample = `<?xml version="1.0"?>
<channels>
  <channel>
    <name>BBC One</name>
    <url>http://example.com/bbc1.m3u8</url>
  </channel>
  <channel>
    <name>CNN</name>
    <url>http://example.com/cnn.m3u8</url>
  </channel>
</channels>`;
                break;
            case 'rss':
                sample = `<?xml version="1.0"?>
<rss version="2.0">
  <channel>
    <title>Streaming Feeds</title>
    <item>
      <title>BBC One Stream</title>
      <enclosure url="http://example.com/bbc1.m3u8" type="video/mpeg"/>
    </item>
    <item>
      <title>CNN Live</title>
      <enclosure url="http://example.com/cnn.m3u8" type="video/mpeg"/>
    </item>
  </channel>
</rss>`;
                break;
            case 'xspf':
                sample = `<?xml version="1.0" encoding="UTF-8"?>
<playlist version="1" xmlns="http://xspf.org/ns/0/">
  <trackList>
    <track><title>BBC One</title><location>http://example.com/bbc1.m3u8</location></track>
    <track><title>CNN</title><location>http://example.com/cnn.m3u8</location></track>
  </trackList>
</playlist>`;
                break;
            case 'csv':
                sample = `name,url
BBC One,http://example.com/bbc1.m3u8
CNN,http://example.com/cnn.m3u8`;
                break;
            case 'pls':
                sample = `[playlist]
File1=http://example.com/bbc1.m3u8
Title1=BBC One
File2=http://example.com/cnn.m3u8
Title2=CNN
NumberOfEntries=2
Version=2`;
                break;
            case 'text':
                sample = `http://example.com/bbc1.m3u8
http://example.com/cnn.m3u8
BBC One,http://example.com/bbc1.m3u8
CNN,http://example.com/cnn.m3u8`;
                break;
        }
        inputArea.value = sample;
    });
</script>
</body>
</html>
